name: Docker Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --file docker/Dockerfile \
            --tag honest-friend:test \
            .

      - name: Verify container starts
        run: |
          docker run -d \
            --name honest-friend-test \
            -e DJANGO_SECRET_KEY=ci-test-secret-key \
            -e DJANGO_DEBUG=False \
            -e DJANGO_ALLOWED_HOSTS=localhost \
            -e GROQ_API_KEY=test-key \
            -p 8000:8000 \
            honest-friend:test

          sleep 5

          # Check container is still running (didn't crash on startup)
          docker ps | grep honest-friend-test && echo "Container is running" || (docker logs honest-friend-test && exit 1)

          docker stop honest-friend-test
